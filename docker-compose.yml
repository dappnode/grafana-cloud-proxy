version: "3.8"

services:
  metrics-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grafana-cloud-proxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  alloy:
    image: grafana/alloy:latest
    container_name: grafana-cloud-alloy
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    environment:
      - ALLOY_REMOTE_WRITE_URL=${ALLOY_REMOTE_WRITE_URL}
      - ALLOY_REMOTE_WRITE_USER=${ALLOY_REMOTE_WRITE_USER}
      - ALLOY_REMOTE_WRITE_PASS=${ALLOY_REMOTE_WRITE_PASS}
    command:
      - run
      - /etc/alloy/config.alloy
    depends_on:
      - metrics-proxy
