version: "3.8"

services:
  metrics-proxy-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: metrics-proxy-dev
    env_file:
      - .env
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

volumes:
  go-mod-cache:
  go-build-cache:
