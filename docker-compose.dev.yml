version: "3.8"

services:
  grafana_cloud_proxy:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: grafana-cloud-proxy-dev
    env_file:
      - .env
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  alloy:
    image: grafana/alloy:latest
    container_name: grafana-cloud-alloy-dev
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    environment:
      - ALLOY_REMOTE_WRITE_URL=${ALLOY_REMOTE_WRITE_URL}
      - ALLOY_REMOTE_WRITE_USER=${ALLOY_REMOTE_WRITE_USER}
      - ALLOY_REMOTE_WRITE_PASS=${ALLOY_REMOTE_WRITE_PASS}
    command:
      - run
      - /etc/alloy/config.alloy
    depends_on:
      - grafana_cloud_proxy

volumes:
  go-mod-cache:
  go-build-cache:
