version: "3.8"

services:
  metrics-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile.dev
    container_name: grafana-cloud-proxy-dev
    env_file:
      - .env
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./proxy:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  alloy:
    build:
      context: ./alloy
      dockerfile: Dockerfile
    container_name: grafana-cloud-alloy-dev
    restart: unless-stopped
    environment:
      - ALLOY_REMOTE_WRITE_URL=${ALLOY_REMOTE_WRITE_URL}
      - ALLOY_REMOTE_WRITE_USER=${ALLOY_REMOTE_WRITE_USER}
      - ALLOY_REMOTE_WRITE_PASS=${ALLOY_REMOTE_WRITE_PASS}
    depends_on:
      - metrics-proxy

volumes:
  go-mod-cache:
  go-build-cache:
