root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/metrics-proxy ./cmd"
bin = "./tmp/metrics-proxy"
include_dir = ["cmd", "internal"]
include_ext = ["go"]
exclude_dir = ["tmp", "vendor"]
exclude_file = []
exclude_regex = ["_test\\.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "1s"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
